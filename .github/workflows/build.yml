name: Build APK

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dibutuhkan untuk membuat dan upload GitHub Release

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Release Mode)
      run: ./gradlew assembleRelease

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/heads/') # Upload hanya saat commit ke branch utama (main/master)
      with:
        name: Latest Build (${{ github.sha }})
        tag_name: build-${{ github.sha }}
        files: app/build/outputs/apk/release/*.apk
        generate_release_notes: true
